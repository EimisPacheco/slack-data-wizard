<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Voice Agent - Tableau Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h2 {
      color: #333;
      margin-bottom: 16px;
    }
    .info {
      background: #e3f2fd;
      padding: 16px;
      border-radius: 4px;
      border-left: 4px solid #2196F3;
      margin-bottom: 20px;
    }
    .test-buttons {
      margin-top: 24px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    button {
      padding: 10px 16px;
      background: #0072B5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button:hover {
      background: #005a8c;
    }
    #log {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 16px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      min-height: 100px;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h2>🎙️ Voice Agent - Tableau Control</h2>
  
  <div class="info">
    <strong>How to use:</strong>
    <ul>
      <li>This page runs outside Tableau so microphone permissions work</li>
      <li>Use voice commands like: "Show me prospecting stage" or "Filter by qualifying"</li>
      <li>The widget below connects to ElevenLabs voice agent</li>
    </ul>
  </div>

  <!-- ElevenLabs Agent widget -->
  <elevenlabs-convai agent-id="agent_0501kefh3cejeyfrjeq637ejrnvb"></elevenlabs-convai>

  <div class="test-buttons">
    <h3>Test Commands (Manual)</h3>
    <button onclick="sendCommand('set_filter', 'Stages', 'Stage', 'Prospecting')">
      Set Stage = Prospecting
    </button>
    <button onclick="sendCommand('set_filter', 'Stages', 'Stage', 'Qualifying')">
      Set Stage = Qualifying
    </button>
    <button onclick="sendCommand('set_filter', 'Stages', 'Stage', 'Closed Won')">
      Set Stage = Closed Won
    </button>
  </div>

  <div id="log"></div>

  <!-- ElevenLabs widget loader -->
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed"></script>

  <script>
    const logEl = document.getElementById('log');

    function log(msg) {
      const timestamp = new Date().toLocaleTimeString();
      logEl.textContent += `[${timestamp}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function sendCommand(action, worksheet, field, value) {
      const command = {
        action,
        worksheet,
        field,
        value
      };

      try {
        log('📤 Sending command: ' + JSON.stringify(command));
        
        const res = await fetch('/api/command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(command)
        });

        const data = await res.json();
        
        if (data.ok) {
          log('✅ Command sent successfully (ID: ' + data.commandId + ')');
        } else {
          log('❌ Command failed: ' + JSON.stringify(data));
        }
      } catch (err) {
        log('❌ Error sending command: ' + err.message);
      }
    }

    // Listen for ElevenLabs widget events (if you want to intercept them)
    // This is optional - you'd need to configure your ElevenLabs agent
    // to call a webhook that hits your /api/command endpoint
    
    log('🎤 Voice agent loaded. You can use voice commands or test buttons.');
  </script>
</body>
</html>
