<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Voice Control Status</title>
    <style>
      body { font-family: system-ui; background: #111; color: #eee; }
      .value { font-size: 40px; font-weight: 700; margin-top: 20px; }
    </style>
  </head>
  <body>
    <h2>Current voice status</h2>
    <div id="value" class="value">Loading…</div>
    <script>
      async function refresh() {
        const res = await fetch('https://tendentially-galeiform-mirta.ngrok-free.dev/control-state');
        const data = await res.json();
        document.getElementById('value').textContent = data.command_value;
      }
      refresh();
      setInterval(refresh, 1500);
    </script>
  </body>
</html>
